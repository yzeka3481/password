<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolam - Güçlü Şifre Oluşturucu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2fe">
    <link rel="icon" type="image/png" href="parolam_logo.png">
    <link rel="apple-touch-icon" href="parolam_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-container">
                <img src="parolam_logo.png" alt="Parolam Logo" id="app-logo" class="logo">
            </div>
            <h1>Parolam</h1>
            <p class="subtitle">Güvenliğiniz bizim önceliğimizdir.</p>
        </header>

        <section class="result-section">
            <div class="result-container">
                <span id="result">Şifreniz burada görünecek</span>
                <button id="clipboard" class="copy-btn" title="Kopyala">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
            <div class="strength-meter">
                <div id="strength-bar" class="strength-bar"></div>
                <span id="strength-text">Güç: -</span>
            </div>
        </section>

        <section class="settings">
            <div class="setting-group">
                <div class="setting-header">
                    <label for="length">Şifre Uzunluğu</label>
                    <span id="length-val">12</span>
                </div>
                <input type="range" id="length" min="6" max="32" value="12" class="slider">
            </div>

            <div class="options-grid">
                <div class="setting">
                    <label class="checkbox-container">
                        Büyük Harf
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="setting">
                    <label class="checkbox-container">
                        Küçük Harf
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="setting">
                    <label class="checkbox-container">
                        Sayılar
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="setting">
                    <label class="checkbox-container">
                        Semboller
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
            </div>
        </section>

        <button id="generate" class="main-btn">Şifre Üret</button>
    </main>

    <footer class="app-footer">
        <p>&copy; 2024 Parolam. Tüm hakları saklıdır.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
