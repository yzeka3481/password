<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Şifre Üretici</h1>
        
        <div class="result-container">
            <span id="result">Şifre Bekleniyor...</span>
            <button id="clipboard" title="Kopyala">
                📋
            </button>
        </div>

        <div class="settings">
            <div class="setting">
                <label>Uzunluk</label>
                <input type="number" id="length" min="4" max="25" value="12">
            </div>
            <div class="setting">
                <label>Büyük Harf</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="setting">
                <label>Sayılar</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting">
                <label>Semboller</label>
                <input type="checkbox" id="symbols" checked>
            </div>
        </div>

        <button class="btn-large" id="generate">YENİ ŞİFRE OLUŞTUR</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
